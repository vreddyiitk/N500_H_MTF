name: N500_H_MTF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas openpyxl matplotlib selenium webdriver-manager

      - name: Run chart generator
        run: python N500_H_MTF.py

      - name: Check charts output
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== Charts folder ==="
          ls -la Nifty500_Hourly_Charts/ || echo "Nifty500_Hourly_Charts/ folder does not exist!"

      - name: Zip charts folder
        run: |
          FOLDER="Nifty500_Hourly_Charts"
          if [ -d "$FOLDER" ] && [ "$(ls -A $FOLDER)" ]; then
            cd "$FOLDER"
            ZIP_NAME="Nifty500_Hourly_Charts_$(date +'%Y-%m-%d').zip"
            zip -j "../${ZIP_NAME}" *.png
            cd ..
            echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
            echo "Created: ${ZIP_NAME}"
            ls -lh "${ZIP_NAME}"
          else
            echo "ERROR: $FOLDER folder is empty or missing"
            ls -la
            exit 1
          fi

      - name: Create GitHub Release with charts
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Nifty500_Hourly_Charts_${{ github.run_number }}
          name: "NSE Horly charts - Run ${{ github.run_number }}"
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
